id: foreach-concurrent-pause
namespace: io.kestra.tests

tasks:
  - id: for_each
    type: io.kestra.plugin.core.flow.ForEach
    values: ["value 1", "value 2", "value 3"]
    concurrencyLimit: 2
    tasks:
      - id: pause
        type: io.kestra.plugin.core.flow.Pause
        delay: PT1S
        tasks:
          - id: log
            type: io.kestra.plugin.core.log.Log
            message: Hello World